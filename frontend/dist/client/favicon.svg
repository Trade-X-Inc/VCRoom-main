<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#7B8FFF"/>
      <stop offset="100%" stop-color="#4F62F0"/>
    </linearGradient>
  </defs>
  <!-- Outer background -->
  <rect width="32" height="32" rx="7" fill="#0D1933"/>
  <!-- Door frame: C-bracket open to left (top bar + right side + bottom bar) -->
  <path d="M13 7 h8 a2 2 0 0 1 2 2 v14 a2 2 0 0 1 -2 2 h-8" fill="#1A3050" stroke="none"/>
  <!-- Blue door panel (open position, swung left) -->
  <rect x="4" y="7" width="12" height="18" rx="2.5" fill="url(#panel)"/>
  <!-- Doorknob -->
  <circle cx="18.5" cy="16" r="1.4" fill="#7B8FFF"/>
</svg>
